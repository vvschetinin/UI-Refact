<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/images/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UI Vite Sample</title>
  </head>
  <body>
    <div class="site-wrapper">
      <header class="header"></header>

      <main class="site-content">
        <section class="hero hero--large">
          <figure class="hero-media">
            <video preload="none" poster="https://tynepressuretesting.com/wp-content/themes/tpt/img/TPTPromoPoster.jpg" loop muted playsinline></video>
          </figure>
          <div class="hero-container">
            <div class="hero-content">
              <h1 class="hero-title">Автоматизация <span>&</span> конверсия бизнес-процессов</h1>
              <div class="hero-text">
                <p>
                  Tyne Pressure Testing is a specialist pressure testing facility dedicated to providing expert testing services to a variety of
                  <a href="/sectors/">sectors</a>.
                </p>
              </div>
              <div class="inline-buttons">
                <a class="btn btn--purple" href="">Submit an enquiry</a>
                <a class="btn btn--white" href="">See our facilities</a>
              </div>
            </div>
          </div>
          <i class="hero-pattern hero-pattern--large svg">
            <svg id="Layer_1" data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 351.72" preserveAspectRatio="none">
              <path class="pattern-highlight" d="M1205,234,0,56V334H1205Z" fill="#DE0030" />
              <path class="pattern-fill" d="M0,309.5,1680,0V351.72H0Z" fill="#f2f2f2" />
            </svg>
          </i>
        </section>
      </main>
      <footer class="footer"></footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
