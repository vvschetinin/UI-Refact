<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/images/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UI Vite Sample</title>
  </head>
  <body>
    <div class="site-wrapper">
      <header class="header"></header>

      <main class="site-content">
        <section class="hero hero--large">
          <figure class="hero-media">
            <video preload="none" poster="https://tynepressuretesting.com/wp-content/themes/tpt/img/TPTPromoPoster.jpg" loop muted playsinline></video>
          </figure>
          <div class="hero-container">
            <div class="hero-content">
              <h1 class="hero-title">HYDROSTATIC <span>&</span> HYPERBARIC PRESSURE TEST CENTRE</h1>
              <div class="hero-text">
                <p>
                  Tyne Pressure Testing is a specialist pressure testing facility dedicated to providing expert testing services to a variety of
                  <a href="/sectors/">sectors</a>.
                </p>
              </div>
              <div class="inline-buttons">
                <a class="btn btn--purple" href="https://tynepressuretesting.com/contact-us/">Submit an enquiry</a>
                <a class="btn btn--white" href="https://tynepressuretesting.com/hyperbaric-chambers/">See our facilities</a>
              </div>
            </div>
          </div>
        </section>
      </main>
      <footer class="footer"></footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
